name: Update GitHub Readme Stats

on:
  schedule:
    - cron: '0 3 * * *'      # Runs every day at 3 AM UTC
  workflow_dispatch:         # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=Keerthana-Chowdary&hide_title=false&hide_rank=false&show_icons=true&include_all_commits=true&count_private=true&disable_animations=false&theme=dracula&locale=en&hide_border=false
          path: profile/stats.svg
          token: ${{ secrets.PAT_1 }}

      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=Keerthana-Chowdary&locale=en&hide_title=false&layout=compact&card_width=320&langs_count=5&theme=dracula&hide_border=false
          path: profile/top-langs.svg
          token: ${{ secrets.PAT_1 }}

      - name: Commit and push updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README stats cards [skip ci]" || exit 0
          git push
