name: Update GitHub Readme Stats

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create profile directory
        run: mkdir -p profile

      - name: Generate GitHub Stats Card (SVG)
        run: |
          curl -o profile/stats.svg \
            "https://github-readme-stats.vercel.app/api?username=Keerthana-Chowdary&theme=dracula"

      - name: Generate Top Languages Card (SVG)
        run: |
          curl -o profile/top-langs.svg \
            "https://github-readme-stats.vercel.app/api/top-langs?username=Keerthana-Chowdary&layout=compact&theme=dracula"

      - name: Commit and push updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --quiet || git commit -m "Update README stats cards [skip ci]"
          git push origin main
